# e2e-marqeta-simulator/docker-compose.yml
# (the obsolete top-level `version:` key is intentionally omitted)
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/simulator.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-5}
    volumes:
      - simulator_data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
      
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_MODEL: qwen3:8b
    volumes:
      - ollama_data:/root/.ollama
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db    
volumes:
  simulator_data:
  mongo_data:
  ollama_data: