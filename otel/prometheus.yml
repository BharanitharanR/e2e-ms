# otel/prometheus.yml
global:
  scrape_interval:     10s
  evaluation_interval: 10s
  external_labels:
    environment: local-docker

scrape_configs:
  # OTel Collector re-exports metrics as a Prometheus scrape endpoint
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metric_relabel_configs:
      # Drop internal collector self-monitoring noise
      - source_labels: [__name__]
        regex: "otelcol_.*"
        action: drop
